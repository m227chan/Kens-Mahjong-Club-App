name: Security scan

on:
  pull_request:
  push:
    branches: [main]

jobs:
  tracked-secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node scripts/check-tracked-secrets.mjs
