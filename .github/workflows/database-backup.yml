name: Encrypted database backup

on:
  schedule:
    - cron: "17 6 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-database-maintenance
  cancel-in-progress: false

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: database-backup
    env:
      DATABASE_URL: ${{ secrets.MIGRATION_DATABASE_URL || secrets.SUPABASE_DATABASE_URL }}
      BACKUP_AGE_RECIPIENT: ${{ vars.BACKUP_AGE_RECIPIENT }}
    steps:
      - name: Check out backup tooling
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Validate backup configuration
        shell: bash
        run: |
          test -n "$DATABASE_URL" || { echo 'Missing MIGRATION_DATABASE_URL'; exit 1; }
          test -n "$BACKUP_AGE_RECIPIENT" || { echo 'Missing BACKUP_AGE_RECIPIENT repository variable'; exit 1; }
      - name: Install age
        run: sudo apt-get update && sudo apt-get install --yes age
      - name: Dump, validate, and encrypt database
        run: bash scripts/backup-database.sh backups
      - name: Upload encrypted backup
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: supabase-backup-${{ github.run_id }}
          path: |
            backups/*.age
            backups/*.sha256
          if-no-files-found: error
          retention-days: 14
          compression-level: 0
