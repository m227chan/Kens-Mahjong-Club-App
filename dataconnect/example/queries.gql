mutation CreatePlayer($name: String!, $email: String!, $joinDate: Date!) @auth(level: USER) {
  player_insert(data: { name: $name, email: $email, joinDate: $joinDate })
}

query GetPlayerStats($playerId: UUID!) @auth(level: USER) {
  clubStats(where: { playerId: { eq: $playerId } }) {
    totalWins
    totalPoints
    rankPosition
  }
}

mutation CreateSession($date: Date!, $location: String!, $status: String!) @auth(level: USER) {
  session_insert(data: { 
    date: $date, 
    location: $location, 
    status: $status,
    organizer: { id_expr: "auth.uid" }
  })
}

query ListGameResults($gameId: UUID!) @auth(level: USER) {
  results(where: { gameId: { eq: $gameId } }) {
    score
    rank
    winningHandDetail
    player {
      name
    }
  }
}